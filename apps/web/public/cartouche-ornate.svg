<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280" preserveAspectRatio="none">
  <defs>
    <!-- Parchment paper gradient: warm cream with subtle vignette -->
    <radialGradient id="parchment" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#fff5e1"/>
      <stop offset="60%" stop-color="#f5e8c8"/>
      <stop offset="100%" stop-color="#e6cda0"/>
    </radialGradient>
    <!-- Floral flourish style: leaf curl on the right corner -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8956d"/>
      <stop offset="100%" stop-color="#a06a3a"/>
    </linearGradient>
    <linearGradient id="leafGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c6a3a"/>
      <stop offset="100%" stop-color="#6e4a25"/>
    </linearGradient>
  </defs>

  <!-- Parchment background -->
  <rect x="0" y="0" width="400" height="280" fill="url(#parchment)"/>

  <!-- Decorative double border -->
  <rect x="10" y="10" width="380" height="260" fill="none" stroke="#a06a3a" stroke-width="2.5" rx="14" ry="14" opacity="0.9"/>
  <rect x="18" y="18" width="364" height="244" fill="none" stroke="#c8956d" stroke-width="1" rx="9" ry="9" opacity="0.7"/>

  <!-- Top-left corner flourish (rose + leaves) -->
  <g transform="translate(8,8) scale(0.55)">
    <!-- Leaves curling -->
    <path d="M 20 30 Q 5 10 25 5 Q 45 0 50 25 Q 52 50 30 60 Q 10 65 5 50 Q 0 35 20 30 Z" fill="url(#leafGrad)"/>
    <path d="M 35 25 Q 50 15 60 30 Q 65 45 50 55 Q 35 60 30 45 Q 30 30 35 25 Z" fill="url(#leafGradDark)"/>
    <!-- Rose -->
    <g transform="translate(28,18)">
      <circle r="14" fill="#a82a3a" opacity="0.95"/>
      <path d="M -8 0 Q 0 -8 8 0 Q 0 8 -8 0 Z" fill="#c8404f"/>
      <path d="M 0 -10 Q 8 0 0 10 Q -8 0 0 -10 Z" fill="#c8404f"/>
      <circle r="5" fill="#7a1a28"/>
    </g>
    <!-- Leaf veins -->
    <path d="M 5 50 Q 25 45 45 30" stroke="#6e4a25" stroke-width="0.6" fill="none" opacity="0.6"/>
  </g>

  <!-- Top-right corner flourish (mirrored) -->
  <g transform="translate(392,8) scale(-0.55, 0.55)">
    <path d="M 20 30 Q 5 10 25 5 Q 45 0 50 25 Q 52 50 30 60 Q 10 65 5 50 Q 0 35 20 30 Z" fill="url(#leafGrad)"/>
    <path d="M 35 25 Q 50 15 60 30 Q 65 45 50 55 Q 35 60 30 45 Q 30 30 35 25 Z" fill="url(#leafGradDark)"/>
    <g transform="translate(28,18)">
      <circle r="14" fill="#a82a3a" opacity="0.95"/>
      <path d="M -8 0 Q 0 -8 8 0 Q 0 8 -8 0 Z" fill="#c8404f"/>
      <path d="M 0 -10 Q 8 0 0 10 Q -8 0 0 -10 Z" fill="#c8404f"/>
      <circle r="5" fill="#7a1a28"/>
    </g>
  </g>

  <!-- Bottom-left corner flourish -->
  <g transform="translate(8,272) scale(0.55, -0.55)">
    <path d="M 20 30 Q 5 10 25 5 Q 45 0 50 25 Q 52 50 30 60 Q 10 65 5 50 Q 0 35 20 30 Z" fill="url(#leafGrad)"/>
    <path d="M 35 25 Q 50 15 60 30 Q 65 45 50 55 Q 35 60 30 45 Q 30 30 35 25 Z" fill="url(#leafGradDark)"/>
    <g transform="translate(28,18)">
      <circle r="14" fill="#a82a3a" opacity="0.95"/>
      <path d="M -8 0 Q 0 -8 8 0 Q 0 8 -8 0 Z" fill="#c8404f"/>
      <path d="M 0 -10 Q 8 0 0 10 Q -8 0 0 -10 Z" fill="#c8404f"/>
      <circle r="5" fill="#7a1a28"/>
    </g>
  </g>

  <!-- Bottom-right corner flourish -->
  <g transform="translate(392,272) scale(-0.55, -0.55)">
    <path d="M 20 30 Q 5 10 25 5 Q 45 0 50 25 Q 52 50 30 60 Q 10 65 5 50 Q 0 35 20 30 Z" fill="url(#leafGrad)"/>
    <path d="M 35 25 Q 50 15 60 30 Q 65 45 50 55 Q 35 60 30 45 Q 30 30 35 25 Z" fill="url(#leafGradDark)"/>
    <g transform="translate(28,18)">
      <circle r="14" fill="#a82a3a" opacity="0.95"/>
      <path d="M -8 0 Q 0 -8 8 0 Q 0 8 -8 0 Z" fill="#c8404f"/>
      <path d="M 0 -10 Q 8 0 0 10 Q -8 0 0 -10 Z" fill="#c8404f"/>
      <circle r="5" fill="#7a1a28"/>
    </g>
  </g>

  <!-- Subtle inner shadow / vignette for depth -->
  <rect x="0" y="0" width="400" height="280" fill="url(#parchment)" opacity="0.0"/>
  <rect x="18" y="18" width="364" height="244" fill="none" stroke="#000" stroke-width="2" rx="9" ry="9" opacity="0.06"/>
</svg>
